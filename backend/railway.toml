# Railway deployment configuration for the Flask/Gunicorn backend service.
#
# In the Railway dashboard → backend service → Settings:
#   Root Directory  : backend
#   Watch Paths     : backend/**
#
# Environment variables required on the BACKEND service:
#   DATABASE_URL          = postgresql://...
#   PARSEHUB_API_KEY      = <your key>
#   PARSEHUB_BASE_URL     = https://www.parsehub.com/api/v2
#   BACKEND_API_KEY       = t_hmXetfMCq3
#   INCREMENTAL_SCRAPING_INTERVAL = 30
#   AUTO_SYNC_INTERVAL    = 5
#   (PORT is injected automatically by Railway — do NOT set it manually)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn api_server:app --workers 2 --threads 2 --worker-class gthread --timeout 120 --keep-alive 5 --bind 0.0.0.0:$PORT --log-level info --access-logfile - --error-logfile -"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
